<svg viewBox="0 0 600 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nightSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E3A52"/>
      <stop offset="60%" stop-color="#465670"/>
      <stop offset="100%" stop-color="#5A6A82"/>
    </linearGradient>
    <linearGradient id="nightWater" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3E4C62"/>
      <stop offset="100%" stop-color="#1E2838"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="0.5" cy="0.5">
      <stop offset="0%" stop-color="#FCEED2" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FCEED2" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="600" height="140" fill="url(#nightSky)"/>

  <!-- Moon glow -->
  <circle cx="320" cy="65" r="50" fill="url(#moonGlow)"/>
  <circle cx="320" cy="65" r="22" fill="#F8E8C4" opacity="0.95"/>
  <circle cx="320" cy="65" r="18" fill="#FCF0D8" opacity="0.9"/>

  <!-- Subtle stars -->
  <circle cx="80" cy="40" r="0.8" fill="#E8E0D0" opacity="0.7"/>
  <circle cx="150" cy="25" r="0.6" fill="#E8E0D0" opacity="0.5"/>
  <circle cx="480" cy="35" r="0.7" fill="#E8E0D0" opacity="0.6"/>
  <circle cx="540" cy="55" r="0.5" fill="#E8E0D0" opacity="0.4"/>
  <circle cx="50" cy="80" r="0.5" fill="#E8E0D0" opacity="0.4"/>

  <!-- Very distant low silhouette -->
  <path d="M 0 138 Q 150 132 300 136 Q 450 130 600 138 L 600 140 L 0 140 Z" fill="#1E2838" opacity="0.5"/>

  <!-- Water -->
  <rect y="140" width="600" height="110" fill="url(#nightWater)"/>

  <!-- Moon reflection trails -->
  <ellipse cx="320" cy="146" rx="20" ry="2" fill="#F8E8C4" opacity="0.55"/>
  <line x1="296" y1="155" x2="344" y2="155" stroke="#E8D4A8" stroke-width="0.6" opacity="0.4"/>
  <line x1="302" y1="166" x2="338" y2="166" stroke="#D8C498" stroke-width="0.5" opacity="0.3"/>
  <line x1="308" y1="178" x2="332" y2="178" stroke="#C8B488" stroke-width="0.4" opacity="0.25"/>
  <line x1="314" y1="192" x2="326" y2="192" stroke="#B8A478" stroke-width="0.3" opacity="0.2"/>

  <!-- Subtle ripples -->
  <ellipse cx="150" cy="200" rx="40" ry="1.5" fill="none" stroke="#5A6A7C" stroke-width="0.5" opacity="0.4"/>
  <ellipse cx="470" cy="220" rx="50" ry="1.5" fill="none" stroke="#5A6A7C" stroke-width="0.5" opacity="0.4"/>

  <!-- Single rice stalk silhouette -->
  <line x1="120" y1="250" x2="120" y2="120" stroke="#0E1828" stroke-width="1.4"/>
  <!-- bowed top with grain heads -->
  <path d="M 120 120 Q 116 117 113 119 Q 116 122 120 120" fill="#0E1828"/>
  <line x1="120" y1="125" x2="116" y2="120" stroke="#0E1828" stroke-width="0.7"/>
  <line x1="120" y1="130" x2="124" y2="124" stroke="#0E1828" stroke-width="0.7"/>
  <line x1="120" y1="136" x2="115" y2="130" stroke="#0E1828" stroke-width="0.6"/>
  <line x1="120" y1="142" x2="125" y2="136" stroke="#0E1828" stroke-width="0.6"/>
  <!-- a leaf-blade -->
  <path d="M 120 160 Q 130 162 138 158 Q 130 164 120 162" fill="#0E1828"/>
</svg>
