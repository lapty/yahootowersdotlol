<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8C8A8"/>
      <stop offset="30%" stop-color="#F4D8C0"/>
      <stop offset="70%" stop-color="#E8DCC8"/>
      <stop offset="100%" stop-color="#D4D8C8"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CCD2C8"/>
      <stop offset="50%" stop-color="#9EAAA8"/>
      <stop offset="100%" stop-color="#6E7A82"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5">
      <stop offset="0%" stop-color="#FFF2DC" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#FFDEB8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFCEA0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="riceGlow" cx="0.5" cy="0.5">
      <stop offset="0%" stop-color="#FFEEB0" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#FFEEB0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="320" fill="url(#sky)"/>

  <!-- Sun -->
  <circle cx="900" cy="170" r="130" fill="url(#sun)"/>
  <circle cx="900" cy="170" r="36" fill="#FFE6C2" opacity="0.85"/>
  <circle cx="900" cy="170" r="28" fill="#FFD8A8" opacity="0.7"/>

  <!-- Distant mountain layers -->
  <path d="M 0 295 Q 100 252 220 274 Q 340 246 460 268 Q 580 240 700 262 Q 820 246 940 268 Q 1060 252 1200 270 L 1200 320 L 0 320 Z"
        fill="#9286A6" opacity="0.4"/>
  <path d="M 0 308 Q 150 282 280 298 Q 420 276 560 298 Q 700 282 840 300 Q 980 288 1200 302 L 1200 320 L 0 320 Z"
        fill="#7E7298" opacity="0.55"/>
  <path d="M 0 316 Q 200 302 380 310 Q 580 296 780 312 Q 980 304 1200 314 L 1200 320 L 0 320 Z"
        fill="#695E84" opacity="0.4"/>

  <!-- Water -->
  <rect y="320" width="1200" height="180" fill="url(#water)"/>

  <!-- Rice field glow halo -->
  <ellipse cx="600" cy="318" rx="180" ry="36" fill="url(#riceGlow)"/>

  <!-- Rice field -->
  <rect x="540" y="312" width="120" height="10" fill="#E8C878" opacity="0.95"/>
  <rect x="546" y="313" width="108" height="7" fill="#F2DC9A"/>
  <rect x="552" y="314" width="96" height="4" fill="#FFEEBC" opacity="0.95"/>

  <!-- Reflection -->
  <rect x="546" y="324" width="108" height="4" fill="#D8B870" opacity="0.5"/>
  <rect x="552" y="330" width="96" height="3" fill="#C8A860" opacity="0.35"/>
  <rect x="558" y="338" width="84" height="2" fill="#B89850" opacity="0.25"/>
  <rect x="566" y="348" width="68" height="1" fill="#A88840" opacity="0.18"/>

  <!-- Water ripples -->
  <ellipse cx="200" cy="380" rx="60" ry="2" fill="none" stroke="#A8B0A8" stroke-width="0.6" opacity="0.4"/>
  <ellipse cx="200" cy="386" rx="40" ry="1.5" fill="none" stroke="#A8B0A8" stroke-width="0.4" opacity="0.3"/>
  <ellipse cx="960" cy="400" rx="80" ry="2" fill="none" stroke="#A8B0A8" stroke-width="0.6" opacity="0.4"/>
  <ellipse cx="960" cy="408" rx="50" ry="1.5" fill="none" stroke="#A8B0A8" stroke-width="0.4" opacity="0.3"/>
  <ellipse cx="460" cy="420" rx="40" ry="1.5" fill="none" stroke="#A8B0A8" stroke-width="0.4" opacity="0.3"/>
  <ellipse cx="780" cy="440" rx="55" ry="1.5" fill="none" stroke="#A8B0A8" stroke-width="0.4" opacity="0.3"/>

  <!-- Reeds left -->
  <g opacity="0.85">
    <line x1="38" y1="500" x2="38" y2="428" stroke="#3A4632" stroke-width="2"/>
    <line x1="48" y1="500" x2="48" y2="438" stroke="#2C3826" stroke-width="2"/>
    <line x1="58" y1="500" x2="60" y2="422" stroke="#3A4632" stroke-width="1.5"/>
    <line x1="68" y1="500" x2="68" y2="445" stroke="#2C3826" stroke-width="1.8"/>
    <path d="M 38 428 Q 36 423 40 420 Q 42 423 38 428" fill="#3A4632"/>
    <path d="M 48 438 Q 46 433 50 430 Q 52 433 48 438" fill="#2C3826"/>
    <path d="M 60 422 Q 58 417 62 414 Q 64 417 60 422" fill="#3A4632"/>
  </g>

  <!-- Reeds right -->
  <g opacity="0.85">
    <line x1="1132" y1="500" x2="1132" y2="424" stroke="#3A4632" stroke-width="2"/>
    <line x1="1144" y1="500" x2="1146" y2="416" stroke="#2C3826" stroke-width="2"/>
    <line x1="1156" y1="500" x2="1156" y2="434" stroke="#3A4632" stroke-width="1.5"/>
    <line x1="1168" y1="500" x2="1168" y2="428" stroke="#2C3826" stroke-width="1.8"/>
    <path d="M 1132 424 Q 1130 419 1134 416 Q 1136 419 1132 424" fill="#3A4632"/>
    <path d="M 1146 416 Q 1144 411 1148 408 Q 1150 411 1146 416" fill="#2C3826"/>
  </g>

  <!-- Foreground band -->
  <path d="M 0 480 Q 200 470 400 478 Q 600 472 800 478 Q 1000 470 1200 480 L 1200 500 L 0 500 Z"
        fill="#3A4632" opacity="0.75"/>
</svg>
